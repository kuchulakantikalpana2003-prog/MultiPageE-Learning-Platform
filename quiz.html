<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADVANCED LMS - QUIZ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f8f9fa; font-family:'Segoe UI'; }
.header { background: linear-gradient(90deg,#4e73df,#36b9cc); color:white; padding:1.5rem; text-align:center; font-weight:bold; font-size:1.8rem; }
.page-heading { font-weight:bold; font-size:1.7rem; color:#4e73df; text-align:center; margin-bottom:2rem; }

.quiz-option{
    margin-bottom:10px;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
    cursor:pointer;
    transition:0.3s;
}
.quiz-option:hover{ background:#eef3ff; }
.correct{ background:#1cc88a; color:white; }
.incorrect{ background:#e74a3b; color:white; }

</style>
</head>

<body>

<header class="header">ADVANCED LMS</header>

<nav class="navbar navbar-light bg-light px-3 mb-4 shadow-sm">
  <a class="fw-bold text-primary" href="dashboard.html">DASHBOARD</a>
  <a class="fw-bold text-primary"  href="courses.html">COURSES</a>
  <a class="fw-bold text-success" href="quiz.html">QUIZ</a>
  <a class="fw-bold text-success" href="profile.html">PROFILE</a>
</nav>

<main class="container">

<h2 class="page-heading">QUIZ</h2>

<!-- TIMER -->
<h5 id="timer" class="text-danger fw-bold text-center"></h5>

<!-- PROGRESS -->
<div class="progress mb-3">
  <div id="progress-bar" class="progress-bar bg-success" style="width:0%"></div>
</div>

<!-- QUIZ -->
<div id="quiz-container"></div>

<!-- RESULT -->
<div id="results" class="text-center mt-4" style="display:none;">
    <h4 id="score" class="fw-bold text-primary"></h4>
    <h4 id="grade" class="fw-bold text-info"></h4>
    <h4 id="feedback" class="fw-bold"></h4>
</div>

<button id="restart-quiz" class="btn btn-warning mt-3">RETRY QUIZ</button>

</main>

<script>
// ===== DATA =====
const quizQuestions = [
    {question:"Which tag defines the main heading?", options:["<h1>","<p>","<div>","<title>"], answer:"<h1>"},
    {question:"CSS property for background color?", options:["color","background-color","bg-color","fill"], answer:"background-color"},
    {question:"Add element at array end?", options:["push()","pop()","shift()","unshift()"], answer:"push()"},
    {question:"Block-scoped JS variables?", options:["var","let","const","let and const"], answer:"let and const"},
    {question:"Convert JSON string to object?", options:["JSON.parse()","JSON.stringify()","JSON.object()","JSON.convert()"], answer:"JSON.parse()"},
    {question:"HTML form tag?", options:["<form>","<input>","<button>","<fieldset>"], answer:"<form>"},
    {question:"Flexbox vertical alignment?", options:["align-items","justify-content","display","position"], answer:"align-items"},
    {question:"Remove last array element?", options:["pop()","push()","shift()","unshift()"], answer:"pop()"},
    {question:"Declare a function in JS?", options:["function myFunc(){}","func myFunc(){}","myFunc=function(){}","def myFunc(){}"], answer:"function myFunc(){}"},
    {question:"Link external CSS file?", options:["<link>","<style>","<script>","<a>"], answer:"<link>"}
];

// ===== VARIABLES =====
let current = 0;
let answers = Array(10).fill(null);
let timeLeft = 180;
let timer;

// ===== TIMER =====
function startTimer(){
    timer = setInterval(()=>{
        let m = Math.floor(timeLeft/60);
        let s = timeLeft%60;
        document.getElementById("timer").textContent = `Time: ${m}:${s<10?'0'+s:s}`;
        if(timeLeft<=0){ clearInterval(timer); submitQuiz(); }
        timeLeft--;
    },1000);
}

// ===== PROGRESS =====
function updateProgress(){
    let percent = ((current+1)/10)*100;
    document.getElementById("progress-bar").style.width = percent+"%";
}

// ===== LOAD QUESTION =====
function showQuestion(){
    const q = quizQuestions[current];
    const container = document.getElementById("quiz-container");

    container.innerHTML = `<h5>${current+1}. ${q.question}</h5>`;

    q.options.forEach(opt=>{
        const div = document.createElement("div");
        div.className = "quiz-option";
        div.textContent = opt;

        div.onclick = ()=>{
            answers[current]=opt;

            if(opt===q.answer) div.classList.add("correct");
            else div.classList.add("incorrect");

            setTimeout(()=>{
                if(current<9){ current++; showQuestion(); }
                else submitQuiz();
            },500);
        };

        container.appendChild(div);
    });

    updateProgress();
}

// ===== GRADE =====
function getGrade(p){
    if(p>=90) return "A+";
    if(p>=80) return "A";
    if(p>=70) return "B";
    if(p>=60) return "C";
    if(p>=50) return "D";
    return "F";
}

// ===== SUBMIT =====
function submitQuiz(){
    clearInterval(timer);

    let score = 0;
    quizQuestions.forEach((q,i)=>{
        if(answers[i]===q.answer) score++;
    });

    let percent = Math.round((score/10)*100);
    let grade = getGrade(percent);
    let result = percent>=50 ? "PASS" : "FAIL";

    document.getElementById("quiz-container").innerHTML = "";
    document.getElementById("results").style.display="block";

    document.getElementById("score").textContent = `Score: ${score} / 10 (${percent}%)`;
    document.getElementById("grade").textContent = `Grade: ${grade}`;
    document.getElementById("feedback").textContent = result;

    // SAVE
    let history = JSON.parse(localStorage.getItem("lms_quiz_history")) || [];
    history.push({date:new Date().toLocaleString(), score, percent, grade, result});
    localStorage.setItem("lms_quiz_history", JSON.stringify(history));
}

// ===== INIT =====
window.onload = ()=>{
    startTimer();
    showQuestion();
};

document.getElementById("restart-quiz").onclick = ()=> location.reload();

</script>

</body>
</html>
