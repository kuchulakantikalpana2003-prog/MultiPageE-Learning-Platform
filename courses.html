<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced LMS - Courses</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family:'Segoe UI', sans-serif; background:#f8f9fa; }
.header { background: linear-gradient(90deg,#4e73df,#36b9cc); color:white; padding:1.5rem; text-align:center; font-weight:bold; font-size:1.8rem; }
.page-heading { font-weight:bold; font-size:1.8rem; color:#4e73df; text-align:center; margin-bottom:2rem;}
.course-card{background:white;border-radius:12px;box-shadow:0 8px 18px rgba(0,0,0,0.12);padding:1rem;}
.course-title{font-weight:bold;color:#4e73df;margin-bottom:10px;}
.lesson-list li{margin-bottom:8px;}
.lesson-list input{margin-right:8px;transform:scale(1.2);}
</style>
</head>

<body>

<header class="header">Advanced LMS</header>

<nav class="navbar navbar-light bg-light px-3 mb-4 shadow-sm">
  <a class="fw-bold text-primary" href="dashboard.html">Dashboard</a>
  <a class="fw-bold text-primary" href="courses.html">Courses</a>
  <a class="fw-bold text-primary" href="quiz.html">Quiz</a>
  <a class="fw-bold text-primary" href="profile.html">Profile</a>
</nav>

<main class="container">

<h2 class="page-heading">COURSES</h2>

<div id="course-list" class="row g-4"></div>

</main>

<script>
const coursesData = [
  { name:"HTML Basics", lessons:["Intro","Tags & Elements","Headings & Paragraphs","Links & Images","Forms"] },
  { name:"CSS Advanced", lessons:["Selectors","Box Model","Flexbox","Grid","Transitions"] },
  { name:"JavaScript Essentials", lessons:["Variables & Data","Functions & Loops","DOM Manipulation","Events","Async JS"] }
];

const STORAGE_KEY = "lms_courses_progress";
let courseProgress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

function renderCourses(){
  const container = document.getElementById("course-list");
  container.innerHTML = "";

  coursesData.forEach(course => {

    if(!courseProgress[course.name]){
      courseProgress[course.name] = course.lessons.map(l => ({
        name:l,
        completed:false
      }));
    }

    let completed = courseProgress[course.name].filter(l => l.completed).length;
    let percent = Math.round((completed / course.lessons.length) * 100);

    // ✅ FIXED HERE
    let lessonsHtml = `<ol class="lesson-list">`;

    courseProgress[course.name].forEach((lesson,i)=>{
      lessonsHtml += `
        <li>
          <input type="checkbox"
            ${lesson.completed ? "checked" : ""}
            onchange="toggleLesson('${course.name}', ${i})">
          ${lesson.name}
        </li>
      `;
    });

    lessonsHtml += `</ol>`;

    const col = document.createElement("div");
    col.className = "col-md-6";

    col.innerHTML = `
      <div class="course-card">
        <div class="course-title">${course.name}</div>

        <div class="progress mb-2">
          <div class="progress-bar bg-success" style="width:${percent}%">
            ${percent}%
          </div>
        </div>

        ${lessonsHtml}
      </div>
    `;

    container.appendChild(col);
  });

  localStorage.setItem(STORAGE_KEY, JSON.stringify(courseProgress));
}

function toggleLesson(courseName,index){
  courseProgress[courseName][index].completed =
    !courseProgress[courseName][index].completed;

  renderCourses();
}

window.onload = renderCourses;

</script>


</body>
<script src="courses.js"></script>
</html>
