<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced LMS - Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family:'Segoe UI', sans-serif; background:#f8f9fa; color:#333; }
.header { background: linear-gradient(90deg,#4e73df,#36b9cc); color:white; padding:1.5rem; text-align:center; font-weight:bold; font-size:1.8rem; }
.page-heading { font-weight:bold; font-size:1.8rem; color:#4e73df; text-align:center; margin-bottom:2rem;}
</style>
</head>
<body>
<section class="header">Advanced LMS</section>
<nav class="navbar navbar-light bg-light px-3 mb-4 shadow-sm">
  <a class="navbar-brand fw-bold text-primary" href="dashboard.html">Dashboard</a>
  <a class="navbar-brand fw-bold text-primary" href="courses.html">Courses</a>
  <a class="navbar-brand fw-bold text-primary" href="quiz.html">Quiz</a>
  <a class="navbar-brand fw-bold text-primary" href="profile.html">Profile</a>
</nav>

<main class="container">
<h2 class="page-heading">PROFILE</h2>

<h4 class="text-success">Completed Courses</h4>
<ul id="completed-courses" class="list-group mb-4"></ul>

<h4 class="text-info">Quiz History</h4>
<table class="table table-bordered shadow-sm mb-4">
<thead class="table-light">
<tr>
  <th>Date</th>
  <th>Score</th>
  <th>Percentage</th>
  <th>Grade</th> <!-- NEW column -->
  <th>Pass/Fail</th>
</tr>
</thead>
<tbody id="quiz-history"></tbody>
</table>

<button id="reset-progress" class="btn btn-danger">Reset All Progress</button>

<script>
const coursesData = [
  { name:"HTML Basics", lessons:["Intro","Tags & Elements","Headings & Paragraphs","Links & Images","Forms"] },
  { name:"CSS Advanced", lessons:["Selectors","Box Model","Flexbox","Grid","Transitions"] },
  { name:"JavaScript Essentials", lessons:["Variables & Data","Functions & Loops","DOM Manipulation","Events","Async JS"] },
  { name:"Advanced Quiz Course", lessons:["Final Quiz"] }
];

const STORAGE_KEY_COURSES="lms_courses_progress";
const STORAGE_KEY_QUIZ="lms_quiz_history";

function renderProfile(){
  const courseProgress=JSON.parse(localStorage.getItem(STORAGE_KEY_COURSES))||{};
  const quizHistory=JSON.parse(localStorage.getItem(STORAGE_KEY_QUIZ))||[];

  // Completed Courses
  const ul=document.getElementById("completed-courses");
  ul.innerHTML="";
  coursesData.forEach(c=>{
    const completed=courseProgress[c.name]?.filter(l=>l.completed).length||0;
    if(completed>0) ul.innerHTML+=`<li class="list-group-item">${c.name} - ${completed}/${c.lessons.length} Lessons Completed</li>`;
  });

  // Quiz History with Grade
  const tbody=document.getElementById("quiz-history");
  tbody.innerHTML="";
  quizHistory.forEach(q=>{
    tbody.innerHTML+=`<tr>
      <td>${q.date}</td>
      <td>${q.score}</td>
      <td>${q.percent}%</td>
      <td>${q.grade || '-'}</td> <!-- Display grade --> 
      <td class="${(q.pass || ((q.score / 10 * 100) >= 50 ? 'PASS' : 'FAIL')) === 'PASS' ? 'bg-success text-white' : 'bg-danger text-white'}">
  ${q.pass || ((q.score / 10 * 100) >= 50 ? 'PASS' : 'FAIL')}
</td>    </tr>`;
  });
}

// Reset Progress
document.getElementById("reset-progress")?.addEventListener("click", ()=>{
  if(confirm("Reset all progress?")){
    localStorage.removeItem(STORAGE_KEY_COURSES);
    localStorage.removeItem(STORAGE_KEY_QUIZ);
    renderProfile();
  }
});

window.onload=renderProfile;
</script>
</main>
</body>
</html>
