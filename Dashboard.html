<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced LMS - Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family:'Segoe UI', sans-serif; background:#f8f9fa; color:#333; }
.header { background: linear-gradient(90deg,#4e73df,#36b9cc); color:white; padding:1.5rem; text-align:center; font-weight:bold; font-size:1.8rem; border-radius:0 0 12px 12px; }
.page-heading { font-weight:bold; font-size:1.8rem; color:#4e73df; margin-bottom:2rem; text-align:center; }
.course-card{background:white;border-radius:12px;box-shadow:0 8px 18px rgba(0,0,0,0.12);padding:1.2rem;transition:all 0.3s;}
.course-card:hover{transform:translateY(-6px);box-shadow:0 12px 24px rgba(0,0,0,0.18);}
.course-title{font-weight:bold;color:#4e73df;margin-bottom:0.8rem;}
.progress{width:100%;height:18px;border-radius:10px;overflow:hidden;}
.course-progress-bar{height:100%;background:linear-gradient(90deg,#1cc88a,#36b9cc);transition:width 0.7s ease;}
</style>
</head>
<body>
<header class="header">Advanced LMS</header>
<nav class="navbar navbar-light bg-light px-3 mb-4 shadow-sm">
  <a class="navbar-brand fw-bold text-primary" href="dashboard.html">Dashboard</a>
  <a class="nav-brand fw-bold text-primary" href="courses.html">Courses</a>
  <a class="nav-link fw-bold text-primary" href="quiz.html">Quiz</a>
  <a class="nav-link fw-bold text-primary" href="profile.html">Profile</a>
</nav>

<main class="container">
<h2 class="page-heading">DASHBOARD</h2>


<div class="progress-container mb-4">
<label for="overall-progress" class="fw-bold">Overall Course Completion</label>
<progress id="overall-progress" value="0" max="100" class="w-100 rounded-pill"></progress>
</div>

<div id="course-cards" class="row g-4 mb-5"></div>

<h4 class="text-success mb-3">Course Completion Chart</h4>
<canvas id="course-chart" height="150"></canvas>

<script>
// ===== DATA =====
const courses = [
  { name:"HTML Basics", lessons:["Intro","Tags & Elements","Headings & Paragraphs","Links & Images","Forms"] },
  { name:"CSS Advanced", lessons:["Selectors","Box Model","Flexbox","Grid","Transitions"] },
  { name:"JavaScript Essentials", lessons:["Variables & Data","Functions & Loops","DOM Manipulation","Events","Async JS"] },
  { name:"Advanced Quiz Course", lessons:["Final Quiz"] }
];

const STORAGE_KEY_COURSES="lms_courses_progress";
let courseProgress=JSON.parse(localStorage.getItem(STORAGE_KEY_COURSES))||{};

// ===== DASHBOARD RENDER =====
function renderDashboard() {
  const container=document.getElementById("course-cards");
  container.innerHTML="";
  let totalLessons=0, totalCompleted=0;

  courses.forEach(c=>{
    if(!courseProgress[c.name]) courseProgress[c.name]=c.lessons.map(l=>({name:l,completed:false}));
    const completedLessons=courseProgress[c.name].filter(l=>l.completed).length;
    const percent=Math.round((completedLessons/c.lessons.length)*100);

    totalLessons += c.lessons.length;
    totalCompleted += completedLessons;

    const card=document.createElement("div");
    card.className="col-md-3 course-card";
    card.innerHTML=`
      <div class="course-title">${c.name}</div>
      <div class="progress mb-2">
        <div class="course-progress-bar" style="width:${percent}%;"></div>
        <div class="card p-3 mt-3 shadow text-center">
      </div>
      <p>${completedLessons}/${c.lessons.length} Lessons Completed</p>
    `;
    container.appendChild(card);
  });

  document.getElementById("overall-progress").value = totalLessons ? Math.round(totalCompleted/totalLessons*100) : 0;

  // Chart
  const ctx=document.getElementById("course-chart").getContext("2d");
  new Chart(ctx,{
    type:'bar',
    data:{
      labels:courses.map(c=>c.name),
      datasets:[{
        label:'Completion %',
        data:courses.map(c=>Math.round(courseProgress[c.name].filter(l=>l.completed).length/c.lessons.length*100)),
        backgroundColor:['#4e73df','#1cc88a','#36b9cc','#f6c23e']
      }]
    },
    options:{responsive:true,scales:{y:{beginAtZero:true,max:100}}}
  });

  localStorage.setItem(STORAGE_KEY_COURSES, JSON.stringify(courseProgress));
}

window.onload = renderDashboard;
</script>
</main>
</body>
</html>
